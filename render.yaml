# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: spirit-talker-api
    runtime: node
    plan: free
    rootDir: .
    # Migrations need DATABASE_URL; keep them in preDeploy (after build, before start) per Render docs.
    buildCommand: corepack enable && pnpm install && pnpm --filter @spirit-talker/shared build && pnpm --filter api run build
    preDeployCommand: corepack enable && pnpm --filter api exec prisma migrate deploy
    startCommand: node apps/api/dist/main.js
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        sync: false
      - key: WEB_APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
